<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa Mundi — My Travels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    /* --- token system ------------------------------------------------ */
    --paper:        #ecdfba;   /* parchment base */
    --paper-shadow: #c9ae76;   /* vignette / aged edge */
    --ocean:        #e3d3a2;   /* sea wash */
    --land:         #c7a878;   /* land wash */
    --ink:          #5b3a22;   /* sepia ink — coastlines, borders, type */
    --ink-deep:     #3c2414;   /* deepest ink, frame linework */
    --navy:         #33424f;   /* faded navy — UI chrome, secondary type */
    --wax:          #8c3b2e;   /* sealing-wax red — pins, accents */
    --gold:         #a9812f;   /* gold leaf — frame, compass, focus rings */
    --card:         #f2e8cd;   /* journal card paper, slightly lighter */

    --font-display: 'Cinzel', serif;
    --font-body: 'EB Garamond', serif;
    --font-mono: 'Courier Prime', monospace;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--paper-shadow);
    font-family: var(--font-body);
    color: var(--ink-deep);
    overflow: hidden;
  }

  /* ---------------------------------------------------------------- */
  /* Outer engraved frame                                              */
  /* ---------------------------------------------------------------- */
  #page{
    position:absolute; inset:10px;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow:
      0 0 0 8px var(--paper),
      0 0 0 10px var(--ink),
      inset 0 0 60px 10px rgba(60,36,20,0.35),
      0 10px 40px rgba(0,0,0,0.45);
  }
  #page::before{
    content:"";
    position:absolute; inset:16px;
    border: 1px solid var(--ink);
    pointer-events:none;
    opacity:0.6;
  }
  /* fine grain / foxing texture, generated, no external image */
  #grain{
    position:absolute; inset:0; pointer-events:none;
    mix-blend-mode: multiply;
    opacity:0.5;
  }

  /* ---------------------------------------------------------------- */
  /* Title cartouche                                                   */
  /* ---------------------------------------------------------------- */
  #cartouche{
    position:absolute; top:22px; left:50%; transform:translateX(-50%);
    z-index:5; text-align:center; pointer-events:none;
  }
  #cartouche h1{
    margin:0; font-family:var(--font-display); font-weight:700;
    font-size:clamp(18px,2.6vw,30px); letter-spacing:0.14em;
    color: var(--ink-deep);
    text-shadow: 0 1px 0 rgba(255,255,255,0.25);
  }
  #cartouche .sub{
    margin-top:2px; font-family:var(--font-body); font-style:italic;
    font-size:12px; letter-spacing:0.08em; color: var(--navy);
  }
  #cartouche .rule{
    width:120px; height:1px; background:var(--ink); margin:6px auto 0; opacity:0.55;
  }

  /* ---------------------------------------------------------------- */
  /* Map viewport                                                       */
  /* ---------------------------------------------------------------- */
  #map-viewport{
    position:absolute; inset:34px;
    overflow:hidden;
    cursor: grab;
    background: var(--ocean);
  }
  #map-viewport.dragging{ cursor: grabbing; }

  #map-stage{
    position:absolute; left:0; top:0;
    width:2000px; height:1000px;
    transform-origin: 0 0;
    will-change: transform;
  }

  svg#worldsvg{ position:absolute; left:0; top:0; width:2000px; height:1000px; display:block; }
  #worldsvg .country{
    fill: var(--land);
    stroke: var(--ink);
    stroke-width:0.6;
    paint-order: stroke fill;
  }
  #layer-high{ display:none; }
  #map-stage.zoomed-in #layer-low{ display:none; }
  #map-stage.zoomed-in #layer-high{ display:block; }

  .continent-label{
    font-family: var(--font-display);
    fill: var(--ink);
    opacity:0.55;
    letter-spacing: 3px;
    text-anchor: middle;
    pointer-events:none;
    user-select:none;
  }
  #map-stage.zoomed-in .continent-label{ opacity:0.25; }

  /* graticule (lat/long lines), faint, old-chart style */
  .graticule{ stroke: var(--ink); stroke-width:0.4; opacity:0.18; fill:none; }

  /* ---------------------------------------------------------------- */
  /* Pins                                                               */
  /* ---------------------------------------------------------------- */
  .pin{
    position:absolute; width:18px; height:18px; margin:-18px -9px;
    cursor:pointer; transform-origin:50% 100%;
  }
  .pin svg{ width:100%; height:100%; display:block; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.35)); }
  .pin.mine .seal{ fill: var(--wax); }
  .pin.other .seal{ fill: var(--navy); }
  .pin:hover{ transform: scale(1.15); }

  .pin-ghost{
    position:absolute; width:14px; height:14px; margin:-14px -7px;
    border-radius:50%; border:2px dashed var(--ink);
    opacity:0.6; pointer-events:none;
  }

  /* ---------------------------------------------------------------- */
  /* Journal card (popup)                                              */
  /* ---------------------------------------------------------------- */
  #journal{
    position:absolute; z-index:50; width:250px;
    background: var(--card);
    border:1px solid var(--ink);
    box-shadow: 0 10px 24px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.25);
    padding:14px 16px 16px;
    font-family: var(--font-body);
    display:none;
    transform: scale(0.85);
    opacity:0;
    transition: transform 0.18s ease, opacity 0.18s ease;
  }
  #journal.show{ display:block; transform:scale(1); opacity:1; }
  #journal::after{ /* torn-paper notch */
    content:""; position:absolute; left:18px; bottom:-9px;
    width:16px; height:16px; background:var(--card);
    border-right:1px solid var(--ink); border-bottom:1px solid var(--ink);
    transform: rotate(45deg);
  }
  #journal h2{
    margin:0 0 8px; font-family:var(--font-display); font-size:13px;
    letter-spacing:0.08em; color:var(--ink-deep); font-weight:600;
  }
  #journal label{ display:block; font-size:11px; color:var(--navy); margin:8px 0 2px; letter-spacing:0.03em; }
  #journal input, #journal textarea{
    width:100%; font-family: var(--font-mono); font-size:12.5px;
    background: rgba(255,255,255,0.35);
    border:1px solid var(--ink); color:var(--ink-deep);
    padding:5px 6px; border-radius:1px;
  }
  #journal textarea{ resize:vertical; min-height:44px; }
  #journal .row{ display:flex; gap:8px; margin-top:12px; }
  #journal button{
    font-family:var(--font-display); font-size:11px; letter-spacing:0.06em;
    padding:7px 10px; border:1px solid var(--ink); background:var(--paper);
    color:var(--ink-deep); cursor:pointer; flex:1;
  }
  #journal button.primary{ background:var(--wax); color:var(--card); border-color:var(--ink-deep); }
  #journal button:hover{ filter:brightness(1.06); }
  #journal .meta{ font-family:var(--font-mono); font-size:10.5px; color:var(--navy); margin-top:2px; }
  #journal .readonly-note{ font-style:italic; font-size:13px; margin-top:4px; line-height:1.4; }
  #journal .close-x{
    position:absolute; top:8px; right:10px; cursor:pointer; font-family:var(--font-display);
    font-size:13px; color:var(--navy); background:none; border:none; padding:0; width:auto; flex:none;
  }

  /* ---------------------------------------------------------------- */
  /* Control cluster                                                   */
  /* ---------------------------------------------------------------- */
  #controls{
    position:absolute; top:34px; right:34px; z-index:10;
    display:flex; flex-direction:column; align-items:flex-end; gap:6px;
  }
  .panel{
    background: rgba(236,223,186,0.92);
    border:1px solid var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    padding:8px 10px;
    font-family: var(--font-body);
  }
  .panel label{ display:block; font-size:10px; letter-spacing:0.06em; color:var(--navy); margin-bottom:3px; }
  .panel input[type=text]{
    font-family:var(--font-mono); font-size:12px; border:1px solid var(--ink);
    background:rgba(255,255,255,0.4); padding:4px 6px; width:150px; color:var(--ink-deep);
  }
  .toggle-row{ display:flex; align-items:center; gap:8px; margin-top:8px; }
  .toggle-row span{ font-size:11px; color:var(--navy); }
  .switch{
    position:relative; width:38px; height:18px; background:var(--paper-shadow);
    border:1px solid var(--ink); cursor:pointer; flex-shrink:0;
  }
  .switch .knob{
    position:absolute; top:1px; left:1px; width:14px; height:14px;
    background:var(--card); border:1px solid var(--ink); transition:left 0.15s ease;
  }
  .switch.on .knob{ left:21px; background:var(--wax); }

  #zoomctl{ display:flex; gap:4px; }
  #zoomctl button{
    width:28px; height:28px; font-family:var(--font-display); font-size:15px;
    border:1px solid var(--ink); background:var(--paper); color:var(--ink-deep); cursor:pointer;
  }
  #zoomctl button:hover{ background:var(--card); }

  #hint{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    font-family:var(--font-body); font-style:italic; font-size:11.5px; color:var(--navy);
    background:rgba(236,223,186,0.85); padding:4px 12px; border:1px solid var(--ink);
    z-index:8; pointer-events:none; opacity:0.9;
  }

  /* ---------------------------------------------------------------- */
  /* Decorative corner pieces                                          */
  /* ---------------------------------------------------------------- */
  #compass{ position:absolute; bottom:38px; left:38px; width:74px; height:74px; z-index:6; opacity:0.85; pointer-events:none; }
  #scalebar{ position:absolute; bottom:38px; right:38px; z-index:6; opacity:0.85; pointer-events:none; }
  #scalebar text{ font-family:var(--font-mono); font-size:9px; fill:var(--ink); }
  #scalebar line{ stroke:var(--ink); stroke-width:1.2; }

  @media (max-width:640px){
    #cartouche h1{ font-size:16px; }
    #controls{ top:auto; bottom:70px; right:14px; }
    #hint{ display:none; }
    .panel input[type=text]{ width:110px; }
  }
</style>
</head>

<script>
/* =====================================================================
   CONFIG — fill these in with your own Supabase project details.
   Project Settings → API → Project URL / anon public key.
===================================================================== */
const SUPABASE_URL = "https://ybmodtyblmvxhhlitxea.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlibW9kdHlibG12eGhobGl0eGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjk4NjcsImV4cCI6MjA5OTcwNTg2N30.Tb2lz_OoNQvDyr3ZhoBxgvYd-gNWqQeaZaJf8bVa3TU";

let supabase = null;
if (SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY") {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

/* =====================================================================
   Projection — must match the equirectangular fit used to generate
   the SVG country layers (2000x1000 viewBox).
===================================================================== */
const PROJ = { width: 2000, height: 1000, scale: 318.30988618379064, tx: 1000, ty: 500 };
function project(lon, lat){
  const lambda = lon * Math.PI/180, phi = lat * Math.PI/180;
  return [ PROJ.scale*lambda + PROJ.tx, -PROJ.scale*phi + PROJ.ty ];
}
function unproject(x, y){
  const lambda = (x - PROJ.tx)/PROJ.scale, phi = (PROJ.ty - y)/PROJ.scale;
  return [ lambda*180/Math.PI, phi*180/Math.PI ];
}

/* =====================================================================
   Graticule + continent labels (decorative, drawn once)
===================================================================== */
(function drawGraticule(){
  const g = document.getElementById('graticule-g');
  let d = "";
  for(let lon=-180; lon<=180; lon+=20){
    const [x1,y1]=project(lon,90), [x2,y2]=project(lon,-90);
    d += `M${x1},${y1}L${x2},${y2}`;
  }
  for(let lat=-80; lat<=80; lat+=20){
    const [x1,y1]=project(-180,lat), [x2,y2]=project(180,lat);
    d += `M${x1},${y1}L${x2},${y2}`;
  }
  const p = document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d", d); p.setAttribute("class","graticule");
  g.appendChild(p);
})();

const CONTINENT_LABELS = [
  ["EUROPE", 15, 54, 11],
  ["AFRICA", 20, 2, 13],
  ["ASIA", 90, 48, 15],
  ["NORTH AMERICA", -100, 48, 12],
  ["SOUTH AMERICA", -58, -18, 12],
  ["OCEANIA", 135, -24, 11],
];
(function drawLabels(){
  const g = document.getElementById('labels-g');
  CONTINENT_LABELS.forEach(([name,lon,lat,size])=>{
    const [x,y] = project(lon,lat);
    const t = document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x", x); t.setAttribute("y", y);
    t.setAttribute("font-size", size*4);
    t.setAttribute("class","continent-label");
    t.textContent = name;
    g.appendChild(t);
  });
})();

/* =====================================================================
   Pan & zoom
===================================================================== */
const viewport = document.getElementById('map-viewport');
const stage = document.getElementById('map-stage');
let scale = 1, panX = 0, panY = 0;
let minScale = 1, maxScale = 8;

function fitInitial(){
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  minScale = Math.max(vw/2000, vh/1000);
  scale = minScale;
  panX = (vw - 2000*scale)/2;
  panY = (vh - 1000*scale)/2;
  applyTransform();
}
function clampPan(){
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const mapW = 2000*scale, mapH = 1000*scale;
  const minX = Math.min(0, vw - mapW), minY = Math.min(0, vh - mapH);
  panX = Math.min(0, Math.max(minX, panX));
  panY = Math.min(0, Math.max(minY, panY));
}
function applyTransform(){
  clampPan();
  stage.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  stage.classList.toggle('zoomed-in', scale > minScale*2.1);
  renderPins();
}
function zoomAt(clientX, clientY, factor){
  const rect = viewport.getBoundingClientRect();
  const mx = clientX - rect.left, my = clientY - rect.top;
  const wx = (mx - panX)/scale, wy = (my - panY)/scale;
  scale = Math.min(maxScale, Math.max(minScale, scale*factor));
  panX = mx - wx*scale; panY = my - wy*scale;
  applyTransform();
}

window.addEventListener('resize', ()=>{ fitInitial(); });

viewport.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoomAt(e.clientX, e.clientY, factor);
}, { passive:false });

document.getElementById('zoomin').onclick = ()=>{
  const r = viewport.getBoundingClientRect();
  zoomAt(r.left+r.width/2, r.top+r.height/2, 1.4);
};
document.getElementById('zoomout').onclick = ()=>{
  const r = viewport.getBoundingClientRect();
  zoomAt(r.left+r.width/2, r.top+r.height/2, 1/1.4);
};
document.getElementById('zoomreset').onclick = fitInitial;

/* drag to pan, click (no drag) to drop a pin */
let dragging = false, dragMoved = false, dragStart = {x:0,y:0};
viewport.addEventListener('mousedown', (e)=>{
  dragging = true; dragMoved = false;
  dragStart = { x:e.clientX, y:e.clientY, panX, panY };
  viewport.classList.add('dragging');
});
window.addEventListener('mousemove', (e)=>{
  if(!dragging) return;
  const dx = e.clientX-dragStart.x, dy = e.clientY-dragStart.y;
  if(Math.abs(dx)>3 || Math.abs(dy)>3) dragMoved = true;
  panX = dragStart.panX + dx; panY = dragStart.panY + dy;
  applyTransform();
});
window.addEventListener('mouseup', (e)=>{
  if(!dragging) return;
  dragging = false; viewport.classList.remove('dragging');
  if(!dragMoved){
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const wx = (mx-panX)/scale, wy = (my-panY)/scale;
    if(wx>=0 && wx<=2000 && wy>=0 && wy<=1000){
      const [lon,lat] = unproject(wx,wy);
      openNewPinCard(lon,lat,e.clientX,e.clientY);
    }
  }
});

/* touch support (basic) */
let lastTouchDist = null, lastTouchMid=null;
viewport.addEventListener('touchstart', (e)=>{
  if(e.touches.length===1){
    dragging = true; dragMoved=false;
    dragStart = { x:e.touches[0].clientX, y:e.touches[0].clientY, panX, panY };
  } else if(e.touches.length===2){
    dragging=false;
    lastTouchDist = touchDist(e.touches); lastTouchMid = touchMid(e.touches);
  }
}, {passive:true});
viewport.addEventListener('touchmove', (e)=>{
  if(e.touches.length===1 && dragging){
    const dx = e.touches[0].clientX-dragStart.x, dy = e.touches[0].clientY-dragStart.y;
    if(Math.abs(dx)>3||Math.abs(dy)>3) dragMoved=true;
    panX = dragStart.panX+dx; panY = dragStart.panY+dy; applyTransform();
  } else if(e.touches.length===2){
    const d = touchDist(e.touches), mid = touchMid(e.touches);
    if(lastTouchDist) zoomAt(mid.x, mid.y, d/lastTouchDist);
    lastTouchDist = d; lastTouchMid = mid;
  }
}, {passive:true});
viewport.addEventListener('touchend', (e)=>{
  if(dragging && !dragMoved && e.changedTouches.length===1){
    const t = e.changedTouches[0];
    const rect = viewport.getBoundingClientRect();
    const mx = t.clientX-rect.left, my = t.clientY-rect.top;
    const wx = (mx-panX)/scale, wy = (my-panY)/scale;
    if(wx>=0 && wx<=2000 && wy>=0 && wy<=1000){
      const [lon,lat] = unproject(wx,wy);
      openNewPinCard(lon,lat,t.clientX,t.clientY);
    }
  }
  dragging=false; lastTouchDist=null;
});
function touchDist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
function touchMid(t){ return { x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 }; }

/* =====================================================================
   Traveler name + show mine/everyone toggle
===================================================================== */
const travInput = document.getElementById('travname');
travInput.value = localStorage.getItem('travelmap_name') || "";
travInput.addEventListener('input', ()=>{
  localStorage.setItem('travelmap_name', travInput.value.trim());
  renderPins();
});
const showToggle = document.getElementById('showtoggle');
const showLabel = document.getElementById('showtoggle-label');
let showMineOnly = localStorage.getItem('travelmap_mineonly') === '1';
function syncToggleUI(){
  showToggle.classList.toggle('on', showMineOnly);
  showLabel.textContent = showMineOnly ? "Showing: mine only" : "Showing: everyone";
}
syncToggleUI();
showToggle.addEventListener('click', ()=>{
  showMineOnly = !showMineOnly;
  localStorage.setItem('travelmap_mineonly', showMineOnly ? '1':'0');
  syncToggleUI(); renderPins();
});

/* =====================================================================
   Pins: data + Supabase sync
===================================================================== */
let allPins = [];

async function loadPins(){
  if(!supabase){ allPins = JSON.parse(localStorage.getItem('travelmap_local_pins')||"[]"); renderPins(); return; }
  const { data, error } = await supabase.from('pins').select('*').order('created_at', { ascending:true });
  if(error){ console.error(error); return; }
  allPins = data || [];
  renderPins();
}
async function savePin(pin){
  if(!supabase){
    pin.id = 'local-'+Date.now();
    allPins.push(pin);
    localStorage.setItem('travelmap_local_pins', JSON.stringify(allPins));
    renderPins();
    return;
  }
  const { data, error } = await supabase.from('pins').insert(pin).select();
  if(error){ alert('Could not save pin: '+error.message); return; }
  allPins.push(data[0]);
  renderPins();
}
async function deletePin(id){
  if(!supabase){
    allPins = allPins.filter(p=>p.id!==id);
    localStorage.setItem('travelmap_local_pins', JSON.stringify(allPins));
    renderPins();
    return;
  }
  const { error } = await supabase.from('pins').delete().eq('id', id);
  if(error){ alert('Could not delete pin: '+error.message); return; }
  allPins = allPins.filter(p=>p.id!==id);
  renderPins();
}

const pinsLayer = document.getElementById('pins-layer');
function renderPins(){
  pinsLayer.innerHTML = "";
  const me = travInput.value.trim().toLowerCase();
  const visible = allPins.filter(p=>{
    if(!showMineOnly) return true;
    return (p.traveler||"").trim().toLowerCase() === me;
  });
  visible.forEach(p=>{
    const [x,y] = project(p.lng, p.lat);
    const el = document.createElement('div');
    const mine = (p.traveler||"").trim().toLowerCase() === me && me.length>0;
    el.className = 'pin ' + (mine ? 'mine' : 'other');
    el.style.left = x*scale + panX + 'px';
    el.style.top = y*scale + panY + 'px';
    el.title = `${p.label||'Untitled'} — ${p.traveler||'unknown'}`;
    el.innerHTML = `<svg viewBox="0 0 24 24"><path class="seal" d="M12 2C7 2 4 5.5 4 9.5c0 5 8 12.5 8 12.5s8-7.5 8-12.5C20 5.5 17 2 12 2z"/><circle cx="12" cy="9.5" r="3" fill="var(--card)"/></svg>`;
    el.addEventListener('click', (ev)=>{ ev.stopPropagation(); openViewPinCard(p, ev.clientX, ev.clientY); });
    pinsLayer.appendChild(el);
  });
}

/* =====================================================================
   Journal card popup
===================================================================== */
const journal = document.getElementById('journal');
const journalBody = document.getElementById('journal-body');
document.getElementById('journal-close').onclick = closeJournal;
function positionJournal(clientX, clientY){
  const pageRect = document.getElementById('page').getBoundingClientRect();
  let left = clientX - pageRect.left - 20;
  let top = clientY - pageRect.top - 210;
  left = Math.max(10, Math.min(left, pageRect.width-270));
  top = Math.max(10, top);
  journal.style.left = left+'px';
  journal.style.top = top+'px';
}
function closeJournal(){ journal.classList.remove('show'); }

function openNewPinCard(lon, lat, clientX, clientY){
  positionJournal(clientX, clientY);
  journalBody.innerHTML = `
    <h2>New waypoint</h2>
    <div class="meta">${lat.toFixed(2)}°, ${lon.toFixed(2)}°</div>
    <label>Place name</label>
    <input type="text" id="np-label" placeholder="e.g. Kyoto, Japan" maxlength="60">
    <label>Date visited</label>
    <input type="text" id="np-date" placeholder="e.g. Spring 2023" maxlength="30">
    <label>Note</label>
    <textarea id="np-note" placeholder="A memory worth keeping..." maxlength="280"></textarea>
    <div class="row">
      <button id="np-cancel">Cancel</button>
      <button class="primary" id="np-save">Pin it</button>
    </div>`;
  journal.classList.add('show');
  document.getElementById('np-cancel').onclick = closeJournal;
  document.getElementById('np-save').onclick = ()=>{
    const traveler = travInput.value.trim() || "Anonymous";
    const pin = {
      traveler,
      lat, lng: lon,
      label: document.getElementById('np-label').value.trim() || "Untitled",
      note: document.getElementById('np-note').value.trim(),
      visited_date: document.getElementById('np-date').value.trim(),
    };
    savePin(pin);
    closeJournal();
  };
}

function openViewPinCard(p, clientX, clientY){
  positionJournal(clientX, clientY);
  const me = travInput.value.trim().toLowerCase();
  const canDelete = (p.traveler||"").trim().toLowerCase() === me && me.length>0;
  journalBody.innerHTML = `
    <h2>${escapeHtml(p.label||'Untitled')}</h2>
    <div class="meta">${p.traveler||'unknown'} · ${escapeHtml(p.visited_date||'')}</div>
    <div class="readonly-note">${escapeHtml(p.note||'')}</div>
    <div class="row">
      <button id="vp-close">Close</button>
      ${canDelete ? '<button id="vp-delete">Remove</button>' : ''}
    </div>`;
  journal.classList.add('show');
  document.getElementById('vp-close').onclick = closeJournal;
  if(canDelete){
    document.getElementById('vp-delete').onclick = ()=>{ deletePin(p.id); closeJournal(); };
  }
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||""; return d.innerHTML; }

/* =====================================================================
   Boot
===================================================================== */
fitInitial();
loadPins();
</script>
